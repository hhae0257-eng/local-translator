<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Translator</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Local Translator <span id="app-version" class="app-version"></span></div>
      <div class="controls">
        <label>
          모델
          <select id="model-select"></select>
        </label>
        <button id="refresh-models" title="모델 목록 새로고침 / Ollama 재연결">⟳</button>
        <label>
          입력
          <select id="source-lang">
            <option value="auto">자동 감지</option>
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="zh">中文</option>
          </select>
        </label>
        <span class="arrow">→</span>
        <label>
          출력
          <select id="target-lang">
            <option value="en">English</option>
            <option value="ko">한국어</option>
            <option value="ja">日本語</option>
            <option value="zh">中文</option>
          </select>
        </label>
        <button id="swap" title="언어 스왑">⇄</button>
        <button id="history-btn" title="번역 기록">기록</button>
        <span id="status" class="status">연결 확인 중…</span>
      </div>
    </header>

    <main class="layout">
      <section class="pane input-pane">
        <header><h2>입력</h2><span id="detected-lang" class="hint"></span></header>
        <textarea id="input" placeholder="번역할 텍스트를 입력하세요. (Ctrl+Enter 로 번역)"></textarea>

        <div class="cpp-panel">
          <button class="cpp-toggle" id="cpp-toggle" title="CPP 필수 태그·문구 설정">
            <span class="cpp-icon">📋</span>
            <span>CPP 설정</span>
            <span class="cpp-badge hidden" id="cpp-badge">●</span>
            <span class="cpp-caret" id="cpp-caret">▸</span>
          </button>
          <div class="cpp-body" id="cpp-body">
            <div class="cpp-row">
              <label for="cpp-tags">필수 태그</label>
              <input type="text" id="cpp-tags" placeholder="#광고 #협찬 #ad" />
            </div>
            <div class="cpp-row">
              <label for="cpp-phrase">필수 문구</label>
              <input type="text" id="cpp-phrase" placeholder="본 포스팅은 유료 광고입니다." />
            </div>
            <div class="cpp-row cpp-row-inline">
              <label>태그 위치</label>
              <label class="radio-label"><input type="radio" name="cpp-pos" value="after" checked> 뒤에 추가</label>
              <label class="radio-label"><input type="radio" name="cpp-pos" value="before"> 앞에 추가</label>
            </div>
          </div>
        </div>

        <footer>
          <span id="char-count" class="hint">0자</span>
          <button id="translate-btn" class="primary">번역 (Ctrl+Enter)</button>
        </footer>
      </section>

      <section class="outputs">
        <article class="pane out-pane" data-style="natural">
          <header>
            <h2>자연스러운 번역</h2>
            <div class="actions">
              <span class="latency hint" data-key="natural"></span>
              <button class="copy" data-key="natural">복사</button>
            </div>
          </header>
          <div class="output" id="out-natural"></div>
        </article>

        <article class="pane out-pane" data-style="sns">
          <header>
            <h2>SNS 스타일</h2>
            <div class="actions">
              <span class="latency hint" data-key="sns"></span>
              <button class="copy" data-key="sns">복사</button>
            </div>
          </header>
          <div class="output" id="out-sns"></div>
        </article>

        <article class="pane out-pane" data-style="formal">
          <header>
            <h2>Formal / 격식체</h2>
            <div class="actions">
              <span class="latency hint" data-key="formal"></span>
              <button class="copy" data-key="formal">복사</button>
            </div>
          </header>
          <div class="output" id="out-formal"></div>
        </article>
      </section>
    </main>

    <!-- History Drawer -->
    <aside id="history-drawer" class="history-drawer" aria-hidden="true">
      <div class="hist-header">
        <span class="hist-title">번역 기록</span>
        <input type="search" id="history-search" class="hist-search" placeholder="검색…" />
        <button id="history-clear-btn" class="hist-clear-btn" title="전체 삭제">전체 삭제</button>
        <button id="history-close-btn" class="hist-close-btn" title="닫기">✕</button>
      </div>
      <div id="history-list" class="hist-list"></div>
    </aside>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
